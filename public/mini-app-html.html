<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Senior Dev Finder</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #222);
      direction: rtl;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--tg-theme-header-bg-color, #2196f3);
      color: white;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .phase-bar {
      display: flex;
      gap: 6px;
      padding: 10px 16px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
    }

    .phase-dot {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #ccc;
      transition: background 0.3s;
    }
    .phase-dot.active { background: #2196f3; }
    .phase-dot.done { background: #4caf50; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bubble.bot {
      background: var(--tg-theme-secondary-bg-color, #e3f2fd);
      align-self: flex-start;
      border-bottom-right-radius: 4px;
    }

    .bubble.user {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, white);
      align-self: flex-end;
      border-bottom-left-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 10px 14px;
      align-self: flex-start;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    footer {
      padding: 10px 12px;
      background: var(--tg-theme-bg-color, #fff);
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }

    #input {
      flex: 1;
      border: 1.5px solid #ccc;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      direction: rtl;
      outline: none;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #222);
      resize: none;
    }
    #input:focus { border-color: #2196f3; }

    #send {
      background: var(--tg-theme-button-color, #2196f3);
      color: var(--tg-theme-button-text-color, white);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #profile-card {
      display: none;
      margin: 12px;
      padding: 16px;
      background: #e8f5e9;
      border-radius: 12px;
      border: 1px solid #a5d6a7;
      font-size: 13px;
      line-height: 2;
    }
    #profile-card h3 { margin-bottom: 8px; color: #2e7d32; }
  </style>
</head>
<body>
  <header>🔍 Senior Dev Finder</header>

  <div class="phase-bar">
    <div class="phase-dot active" id="p1"></div>
    <div class="phase-dot" id="p2"></div>
    <div class="phase-dot" id="p3"></div>
  </div>

  <div id="chat"></div>
  <div id="profile-card"></div>

  <footer>
    <textarea id="input" rows="1" placeholder="پیامت رو بنویس..."></textarea>
    <button id="send">↑</button>
  </footer>

  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.expand();

    const uid = new URLSearchParams(location.search).get("uid") || "test_user";
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    let phase = 1;

    function addBubble(text, who) {
      const b = document.createElement("div");
      b.className = `bubble ${who}`;
      b.textContent = text;
      chat.appendChild(b);
      chat.scrollTop = chat.scrollHeight;
      return b;
    }

    function showTyping() {
      const t = document.createElement("div");
      t.className = "typing";
      t.innerHTML = "<span></span><span></span><span></span>";
      t.id = "typing";
      chat.appendChild(t);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      document.getElementById("typing")?.remove();
    }

    function updatePhase(n) {
      phase = n;
      for (let i = 1; i <= 3; i++) {
        const dot = document.getElementById(`p${i}`);
        if (i < n) dot.className = "phase-dot done";
        else if (i === n) dot.className = "phase-dot active";
        else dot.className = "phase-dot";
      }
    }

    function showProfile(profile) {
      const card = document.getElementById("profile-card");
      card.style.display = "block";
      card.innerHTML = `
        <h3>✅ پروفایل استخدامی</h3>
        <div>🛠 Stack: <b>${profile.stack}</b></div>
        <div>📊 سطح: <b>${profile.level}</b></div>
        <div>👥 تعداد: <b>${profile.count} نفر</b></div>
        <div>🏗 ساختار تیم: <b>${profile.teamStructure}</b></div>
        <div>💰 بودجه: <b>${profile.budget}</b></div>
        <div>🎯 اولویت‌ها: <b>${profile.priorities}</b></div>
        <div>📝 پروژه: <b>${profile.projectDesc}</b></div>
      `;
      // Send to Telegram Bot
      tg?.sendData(JSON.stringify({ type: "profile_complete", profile }));
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      addBubble(text, "user");
      input.value = "";
      input.style.height = "auto";
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userId: uid, message: text }),
        });
        const data = await res.json();
        hideTyping();
        addBubble(data.reply, "bot");

        // Auto-detect phase from message keywords
        if (data.reply.includes("ساختار") || data.reply.includes("تیم")) updatePhase(2);
        if (data.reply.includes("بودجه") || data.reply.includes("حقوق")) updatePhase(3);

        if (data.profile) {
          updatePhase(3);
          showProfile(data.profile);
        }
      } catch {
        hideTyping();
        addBubble("خطا در ارتباط با سرور. دوباره امتحان کن.", "bot");
      }
    }

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 100) + "px";
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage(input.value);
      }
    });

    document.getElementById("send").onclick = () => sendMessage(input.value);

    // Initial greeting
    setTimeout(() => {
      addBubble("سلام! 👋 من اینجام تا کمک کنم پروفایل استخدامی Senior Developer مورد نیازت رو طراحی کنیم.\n\nاول بگو: شرکتت چه کاری انجام میده و چرا نیاز به Senior Dev داری؟", "bot");
    }, 500);
  </script>
</body>
</html>
